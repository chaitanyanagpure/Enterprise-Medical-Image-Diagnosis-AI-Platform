<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="medGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" /> <!-- Deep Medical Blue -->
      <stop offset="100%" stop-color="#06B6D4" /> <!-- Cyan Accent -->
    </linearGradient>
    
    <!-- Glow filter for a premium clinical aesthetic -->
    <filter id="medGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Navy rounded base matching the sidebar background -->
  <rect width="128" height="128" rx="32" fill="#0F172A" />

  <!-- Stylized brain hemispheres / medical cross overlay -->
  <g filter="url(#medGlow)" transform="translate(16, 16) scale(0.75)">
    <!-- Left Hemisphere (Deep Blue nodes) -->
    <path d="M64 8C33.1 8 8 33.1 8 64c0 14.1 5.2 27 13.8 36.9.5.6 1.3 1 2.2 1h16c1.1 0 2-.9 2-2V83c0-3.3 2.7-6 6-6h12c1.1 0 2-.9 2-2V48c0-8.8 7.2-16 16-16h2V10c0-1.1-.9-2-2-2z" fill="#2563EB" />
    
    <!-- Right Hemisphere (Cyan nodes) -->
    <path d="M64 8c30.9 0 56 25.1 56 56 0 14.1-5.2 27-13.8 36.9-.5.6-1.3 1-2.2 1H88c-1.1 0-2-.9-2-2V83c0-3.3-2.7-6-6-6H68c-1.1 0-2-.9-2-2V48c0-8.8-7.2-16-16-16h-2V10c0-1.1.9-2 2-2z" fill="#06B6D4" fill-opacity="0.95" />
    
    <!-- Central Active Core (Medical Cross) -->
    <path d="M64 42c-2.2 0-4 1.8-4 4v14H46c-2.2 0-4 1.8-4 4s1.8 4 4 4h14v14c0 2.2 1.8 4 4 4s4-1.8 4-4V68h14c2.2 0 4-1.8 4-4s-1.8-4-4-4H68V46c0-2.2-1.8-4-4-4z" fill="#FFFFFF" />
  </g>
</svg>